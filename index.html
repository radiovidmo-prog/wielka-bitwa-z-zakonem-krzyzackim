    <style>
        body {
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #ekran {
            width: 800px;
            height: 600px;
            border: 2px solid #333;
            background-color: white;
            position: relative;
            overflow: hidden;
            display: flex; /* Do wyśrodkowania plansz */
            justify-content: center;
            align-items: center;
        }
        .plansza {
            display: none; /* Domyślnie ukryte */

            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: space-between;
        }

            display: flex; /* Pokaż aktywną planszę */
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #0056b3;
        }
